<!-- chat.html -->

<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Phone | OMID Community</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}


body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
radial-gradient(circle at top,#243b70,#050505 70%);

color:white;
overflow:hidden;

}


body::before,
body::after{

content:"";
position:absolute;
border-radius:50%;
filter:blur(120px);
z-index:0;

}


body::before{

width:450px;
height:450px;
background:#00d9ff;
top:-150px;
left:-100px;

}


body::after{

width:400px;
height:400px;
background:#8a2cff;
bottom:-120px;
right:-100px;

}


.container{

position:relative;
z-index:2;

width:430px;

padding:45px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.15);

backdrop-filter:blur(30px);

border-radius:35px;

box-shadow:
0 30px 80px rgba(0,0,0,.5);

text-align:center;

}


.logo{

font-size:30px;
font-weight:800;

}


.logo span{

color:#00d9ff;

}


.icon{

margin:30px auto;

width:90px;
height:90px;

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

background:
linear-gradient(135deg,#00d9ff,#8a2cff);

font-size:40px;

box-shadow:
0 0 40px #00d9ff88;

}


h1{

font-size:28px;
margin-bottom:15px;

}


p{

opacity:.7;
line-height:1.6;
margin-bottom:30px;

}


input{

width:100%;

padding:16px;

margin-bottom:18px;

border-radius:18px;

border:1px solid #ffffff20;

background:#ffffff10;

color:white;

outline:none;

font-size:16px;

}


input:focus{

border-color:#00d9ff;

box-shadow:
0 0 20px #00d9ff55;

}


button{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:
linear-gradient(90deg,#00d9ff,#8a2cff);

color:white;

font-weight:800;

cursor:pointer;

font-size:16px;

transition:.3s;

}


button:hover{

transform:translateY(-3px);

box-shadow:
0 15px 30px #00d9ff55;

}


#code-section{

display:none;

}


</style>

</head>

<body>

<div class="container">

<div class="logo">
OMID<span>.</span>
</div>

<div class="icon">
<i class="fa-solid fa-mobile-screen-button"></i>
</div>

<h1>
Verify Your Phone
</h1>

<p>
Secure your account with SMS verification
</p>

<input 
id="phone"
placeholder="+93xxxxxxxxx">

<div id="recaptcha-container"></div>

<button id="sendCode">
Send Verification Code
</button>

<div id="code-section">

<br>

<input
id="verificationCode"
placeholder="Enter SMS Code">

<button id="verifyCode">

Verify Phone

</button>

</div>

</div>

  <script type="module" src="chat.js"></script>

</body>
</html>
