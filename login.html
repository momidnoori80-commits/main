```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
OMID Community | Login
</title>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">



<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;

}



body{


min-height:100vh;

display:flex;

justify-content:center;

align-items:center;


background:

radial-gradient(circle at top,#243b75,#020305 65%);


color:white;

overflow:hidden;


}





body::before,
body::after{


content:"";

position:absolute;

border-radius:50%;

filter:blur(120px);

z-index:0;


}



body::before{


width:500px;

height:500px;

background:#00d9ff;

top:-200px;

left:-200px;

opacity:.35;


}



body::after{


width:500px;

height:500px;

background:#8a2cff;

right:-200px;

bottom:-200px;

opacity:.3;


}





.container{


width:100%;

max-width:450px;

padding:20px;

z-index:2;


}



.card{


background:

rgba(255,255,255,.08);


border:

1px solid rgba(255,255,255,.15);


backdrop-filter:

blur(30px);


border-radius:35px;


padding:45px 35px;


box-shadow:

0 30px 90px rgba(0,0,0,.5);


animation:

show .8s ease;


}





@keyframes show{


from{

opacity:0;

transform:

translateY(50px)
scale(.95);


}


to{


opacity:1;

transform:

translateY(0)
scale(1);


}


}






.back{


display:inline-flex;

gap:10px;

align-items:center;

color:white;

opacity:.7;

text-decoration:none;

margin-bottom:30px;

transition:.3s;


}



.back:hover{

color:#00d9ff;

}





.logo{


text-align:center;

margin-bottom:35px;


}




.logo i{


font-size:55px;


width:100px;

height:100px;

display:flex;

align-items:center;

justify-content:center;

margin:auto;


border-radius:30px;


background:

linear-gradient(135deg,#00d9ff,#8a2cff);


box-shadow:

0 20px 50px #00d9ff55;


}





.logo h1{


font-size:38px;

margin-top:20px;

font-weight:900;


}



.logo span{

color:#00d9ff;

}



.logo p{


opacity:.6;

margin-top:8px;


}





h2{


font-size:30px;

margin-bottom:25px;

text-align:center;


}







.input-box{


position:relative;

margin-bottom:20px;


}



.input-box i{


position:absolute;

left:18px;

top:18px;

opacity:.6;


}




input{


width:100%;


padding:17px 50px;


border-radius:18px;


background:

rgba(255,255,255,.08);


border:

1px solid rgba(255,255,255,.15);


color:white;


outline:none;


font-size:15px;


transition:.3s;


}




input:focus{


border-color:#00d9ff;


box-shadow:

0 0 25px #00d9ff55;


}








button{


width:100%;


cursor:pointer;


border:none;


font-size:16px;

font-weight:800;


}




#loginBtn{


padding:17px;

border-radius:18px;


background:

linear-gradient(
135deg,
#00d9ff,
#8a2cff
);


color:white;


margin-top:10px;


transition:.3s;


}




#loginBtn:hover{


transform:

translateY(-4px);


box-shadow:

0 20px 40px #00d9ff55;


}








.divider{


display:flex;

align-items:center;

gap:15px;

margin:30px 0;

opacity:.5;


}



.divider::before,
.divider::after{


content:"";

height:1px;

background:white;

flex:1;


}








#googleBtn{


padding:16px;

border-radius:18px;


background:white;


color:#111;


transition:.3s;


}




#googleBtn:hover{


transform:

translateY(-3px);


}




#googleBtn i{


color:#4285f4;

margin-right:10px;


}





.bottom{


text-align:center;

margin-top:30px;

opacity:.8;


}



.bottom a{


color:#00d9ff;

text-decoration:none;

font-weight:700;


}






@media(max-width:500px){



.card{

padding:35px 25px;

}



.logo h1{

font-size:32px;

}



}



</style>


</head>






<body>



<div class="container">


<div class="card">





<a class="back" href="index.html">

<i class="fa-solid fa-arrow-left"></i>

Back Home

</a>








<div class="logo">


<i class="fa-solid fa-users"></i>


<h1>

OMID<span>.</span>

</h1>


<p>

Your modern community

</p>


</div>







<h2>

Welcome Back

</h2>








<div class="input-box">


<i class="fa-solid fa-envelope"></i>


<input

id="email"

type="email"

placeholder="Email address"

autocomplete="email">


</div>








<div class="input-box">


<i class="fa-solid fa-lock"></i>


<input

id="password"

type="password"

placeholder="Password"

autocomplete="current-password">


</div>








<button id="loginBtn">


<i class="fa-solid fa-right-to-bracket"></i>

Login


</button>







<div class="divider">

OR

</div>







<button id="googleBtn">


<i class="fa-brands fa-google"></i>


Continue with Google


</button>








<div class="bottom">


Don't have an account?


<a href="signup.html">

Create one

</a>


</div>







</div>

</div>







<script type="module" src="auth.js"></script>



</body>

</html>
```
