<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enter Community | Mohammad Omid Noori</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}


body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#26315f,#050505 60%);

    color:white;
    overflow:hidden;

}


body::before{

content:"";

position:absolute;

width:500px;
height:500px;

background:#00d9ff;

filter:blur(150px);

opacity:.25;

top:-150px;
left:-150px;

}


body::after{

content:"";

position:absolute;

width:400px;
height:400px;

background:#9d00ff;

filter:blur(150px);

opacity:.25;

bottom:-100px;
right:-100px;

}


.card{

position:relative;
z-index:2;

width:420px;

padding:45px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(25px);

border-radius:30px;

box-shadow:
0 0 60px rgba(0,0,0,.5);

animation:appear .8s ease;


}


@keyframes appear{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}


.logo{

text-align:center;

font-size:30px;

font-weight:800;

margin-bottom:10px;

}


.logo span{

color:#00d9ff;

}


.subtitle{

text-align:center;

opacity:.7;

margin-bottom:35px;

}



.input{

position:relative;

margin-bottom:20px;

}


.input i{

position:absolute;

left:15px;

top:16px;

opacity:.6;

}


input{

width:100%;

padding:15px 45px;

background:#ffffff10;

border:1px solid #ffffff20;

border-radius:15px;

color:white;

outline:none;

font-size:15px;

}


input:focus{

border-color:#00d9ff;

box-shadow:0 0 20px #00d9ff55;

}



.main-btn{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:
linear-gradient(90deg,#00d9ff,#7b2cff);

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

margin-top:10px;

}



.main-btn:hover{

transform:scale(1.03);

}



.divider{

text-align:center;

margin:25px 0;

opacity:.5;

}



.google{

width:100%;

padding:14px;

border-radius:15px;

border:none;

cursor:pointer;

background:white;

color:#111;

font-weight:600;

font-size:15px;

}


.google i{

margin-right:10px;

color:#4285f4;

}



.bottom{

text-align:center;

margin-top:25px;

opacity:.8;

}


a{

color:#00d9ff;

text-decoration:none;

}



</style>

</head>

<body>

<div class="card">

<div class="logo">

Mohammad Omid<span>.</span>

</div>

<div class="subtitle">

Enter your community account

</div>

<div class="input">

<i class="fa-solid fa-envelope"></i>

<input id="email" type="email" placeholder="Email">

</div>

<div class="input">

<i class="fa-solid fa-lock"></i>

<input id="password" type="password" placeholder="Password">

</div>

<button class="main-btn" id="loginBtn">

Enter Community

</button>

<div class="divider">

OR

</div>

<button class="google" id="googleBtn">

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<div class="bottom">

Don't have an account?

<a href="Signup.html">
Create Account
</a>

</div>

</div>

<script type="module">


import {auth, db} from "./firebase.js";


import {

signInWithEmailAndPassword,

GoogleAuthProvider,

signInWithPopup

}

from

"https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";


import {

doc,

getDoc

}

from

"https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";



loginBtn.onclick=async()=>{

try{

const result = await signInWithEmailAndPassword(

auth,

email.value,

password.value

);


const userDoc = await getDoc(
    doc(db,"users",result.user.uid)
);


if(!userDoc.exists()){

    location.href="phone.html";

}

else{


const data = userDoc.data();


if(data.phoneVerified !== true){

    location.href="phone.html";

}

else if(data.passwordCreated !== true){

    location.href="create-password.html";

}

else{

    location.href="index.html";

}


}


}

catch(error){

alert(error.message);

}

};





googleBtn.onclick=async()=>{


try{


const provider =
new GoogleAuthProvider();


const result = await signInWithPopup(auth,provider);


const userDoc = await getDoc(
    doc(db,"users",result.user.uid)
);


if(!userDoc.exists()){

    location.href="phone.html";

}

else{


const data = userDoc.data();


if(data.phoneVerified !== true){

    location.href="phone.html";

}

else if(data.passwordCreated !== true){

    location.href="create-password.html";

}

else{

    location.href="index.html";

}


}

}

catch(error){

alert(error.message);

}


};



</script>

</body>
</html>
