<!DOCTYPE html>
<html>
<head>
<title>Login | Mohammad Omid</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,#050505,#171717);

    color:white;

}


.container{

    width:380px;
    padding:40px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    border-radius:25px;

    box-shadow:0 20px 50px rgba(0,0,0,.4);

}



h1{

    text-align:center;
    margin-bottom:30px;

}


input{

    width:100%;
    padding:14px;

    margin:10px 0;

    border:none;
    outline:none;

    border-radius:12px;

    background:#ffffff15;
    color:white;

}



button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    margin-top:15px;

    cursor:pointer;

    font-size:16px;

}



.login{

    background:#4f46e5;
    color:white;

}



.social{

    background:white;
    color:black;

}



.instagram{

    background:#e1306c;
    color:white;

}



.divider{

    text-align:center;
    margin:20px 0;
    opacity:.6;

}



a{

    color:#8ab4ff;
    text-decoration:none;

}



</style>

</head>


<body>


<div class="container">


<h1>
Welcome Back
</h1>


<input id="email" type="email" placeholder="Email">


<input id="password" type="password" placeholder="Password">


<button class="login" id="loginBtn">
Login
</button>


<div class="divider">
OR
</div>


<button class="social" id="googleBtn">
Continue with Google
</button>


<button class="instagram">
Continue with Instagram
</button>



<p style="text-align:center;margin-top:25px">

Don't have an account?

<a href="signup.html">
Sign Up
</a>

</p>



</div>



<script type="module">

import {auth} from "./firebase.js";

import {
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup

} from 
"https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";



document
.getElementById("loginBtn")
.onclick = async()=>{


try{

await signInWithEmailAndPassword(

auth,

email.value,

password.value

);


alert("Login successful");

location.href="index.html";


}

catch(error){

alert(error.message);

}


};



document
.getElementById("googleBtn")
.onclick=async()=>{


const provider =
new GoogleAuthProvider();


try{


await signInWithPopup(auth,provider);


alert("Google login successful");


location.href="index.html";


}

catch(error){

alert(error.message);

}


};



</script>


</body>
</html>
