<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMID Community Chat</title>

<link rel="stylesheet" href="main.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>


<div class="background"></div>



<div class="app">



<!-- TOP BAR -->

<header>


<div class="profile">


<img src="https://i.pravatar.cc/150" class="profile-image">


<div class="profile-info">

<h3>
Username
</h3>

<span>
🟢 Online
</span>

</div>


</div>



<button class="theme-button" id="themeButton">

<i class="fa-solid fa-moon"></i>

</button>


</header>





<!-- MAIN AREA -->


<div class="chat-container">



<!-- USERS SIDEBAR -->


<aside>



<div class="search-box">

<i class="fa-solid fa-search"></i>

<input 
placeholder="Search users..."
>


</div>





<div class="users">



<div class="user active">


<img src="https://i.pravatar.cc/100?img=5">


<div>

<h4>
Alex
</h4>

<p>
Hello 👋
</p>

</div>


</div>





<div class="user">


<img src="https://i.pravatar.cc/100?img=8">


<div>

<h4>
Sarah
</h4>

<p>
See you soon
</p>

</div>


</div>





</div>


</aside>







<!-- CHAT AREA -->


<section class="chat">



<div class="chat-header">


<img src="https://i.pravatar.cc/100?img=5">


<div>

<h3>
Alex
</h3>

<span>
Online
</span>


</div>


</div>





<div class="messages">



<div class="message received">

Hey! Welcome to OMID Community 👋

</div>





<div class="message sent">

Thanks! This looks amazing 🚀

</div>





<div class="message received">

Let's build something great.

</div>



</div>







<!-- MESSAGE INPUT -->


<div class="input-area">


<button>

<i class="fa-solid fa-paperclip"></i>

</button>



<input 
type="text"
placeholder="Write a message..."
>



<button>

<i class="fa-solid fa-face-smile"></i>

</button>



<button class="send">

<i class="fa-solid fa-paper-plane"></i>

</button>


</div>




</section>



</div>



</div>



<script src="main.js"></script>


</body>

</html>
