<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Mohammad Omid Noori</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;

}



body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
radial-gradient(circle at top,#35205f,#050505 60%);

color:white;

overflow:hidden;

}



body::before{

content:"";

position:absolute;

width:500px;
height:500px;

background:#00d9ff;

filter:blur(160px);

opacity:.25;

top:-150px;

right:-100px;

}



body::after{

content:"";

position:absolute;

width:450px;
height:450px;

background:#ff0080;

filter:blur(160px);

opacity:.2;

bottom:-150px;

left:-100px;

}



.card{


position:relative;

z-index:2;


width:430px;


padding:45px;


background:

rgba(255,255,255,.08);



border:

1px solid rgba(255,255,255,.15);



backdrop-filter:blur(25px);


border-radius:30px;


box-shadow:

0 0 70px rgba(0,0,0,.6);



animation:

show .8s ease;



}



@keyframes show{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:translateY(0);

}

}



.logo{

text-align:center;

font-size:30px;

font-weight:800;

}



.logo span{

color:#00d9ff;

}



.subtitle{

text-align:center;

opacity:.7;

margin:

10px 0 30px;

}



.input{

position:relative;

margin-bottom:18px;

}



.input i{

position:absolute;

left:15px;

top:16px;

opacity:.6;

}



input{

width:100%;

padding:

15px 45px;


border-radius:15px;


border:

1px solid rgba(255,255,255,.15);


background:

rgba(255,255,255,.08);



color:white;

outline:none;

}



input:focus{

border-color:#00d9ff;

box-shadow:

0 0 20px #00d9ff55;

}



.password-strength{

height:5px;

border-radius:10px;

background:#ffffff20;

margin-top:-10px;

margin-bottom:15px;

overflow:hidden;

}



#strength{

height:100%;

width:0%;

transition:.3s;

background:#ff3333;

}



.main-btn{


width:100%;


padding:15px;


border:none;


border-radius:15px;


background:

linear-gradient(90deg,#00d9ff,#7b2cff);


color:white;


font-weight:700;


font-size:16px;


cursor:pointer;



}



.google{


margin-top:15px;


width:100%;


padding:14px;


border:none;


border-radius:15px;


background:white;


color:#111;


font-weight:600;


cursor:pointer;



}



.google i{

color:#4285f4;

margin-right:10px;

}



.divider{

text-align:center;

margin:

20px 0;

opacity:.5;

}



.bottom{

text-align:center;

margin-top:25px;

opacity:.8;

}



a{

color:#00d9ff;

text-decoration:none;

}



.terms{

font-size:13px;

opacity:.7;

margin:15px 0;

}


</style>

</head>

<body>

<div class="card">

<div class="logo">

Mohammad Omid<span>.</span>

</div>

<div class="subtitle">

Create your community identity

</div>

<div class="input">

<i class="fa-solid fa-user"></i>

<input id="name" placeholder="Full Name">

</div>

<div class="input">

<i class="fa-solid fa-envelope"></i>

<input id="email" placeholder="Email">

</div>

<div class="input">

<i class="fa-solid fa-lock"></i>

<input 
id="password"
type="password"
placeholder="Password">

</div>

<div class="password-strength">

<div id="strength"></div>

</div>

<div class="terms">

By creating an account you agree to join the community.

</div>

<button class="main-btn" id="signupBtn">

Create Account

</button>

<div class="divider">

OR

</div>

<button class="google" id="googleBtn">

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<div class="bottom">

Already have an account?

<a href="login.html">

Enter Community

</a>

</div>

</div>

<script type="module">


import {auth,db} from "./firebase.js";


import {

createUserWithEmailAndPassword,

GoogleAuthProvider,

signInWithPopup

}

from

"https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";



import {

doc,

setDoc

}

from

"https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";






password.oninput=()=>{


let value=password.value.length;


let bar=document.getElementById("strength");


if(value<4){

bar.style.width="25%";

}

else if(value<8){

bar.style.width="60%";

bar.style.background="#ffaa00";

}

else{

bar.style.width="100%";

bar.style.background="#00ff99";

}


};






signupBtn.onclick=async()=>{


try{


const result=

await createUserWithEmailAndPassword(

auth,

email.value,

password.value

);



await setDoc(

doc(

db,

"users",

result.user.uid

),{


name:name.value,

email:email.value,

role:"user",

createdAt:new Date()


}

);



location.href="index.html";


}

catch(error){

alert(error.message);

}


};






googleBtn.onclick=async()=>{


try{


const provider=

new GoogleAuthProvider();



await signInWithPopup(

auth,

provider

);



location.href="index.html";


}

catch(error){

alert(error.message);

}


};



</script>

</body>

</html>
