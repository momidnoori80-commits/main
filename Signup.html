```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
OMID Community | Create Account
</title>



<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">



<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;

}



body{


min-height:100vh;

display:flex;

align-items:center;

justify-content:center;


background:

radial-gradient(circle at top,#253b75,#030405 65%);


color:white;

overflow:hidden;


}





body::before,
body::after{


content:"";

position:absolute;

border-radius:50%;

filter:blur(130px);

z-index:0;


}





body::before{


width:550px;

height:550px;

background:#00d9ff;

top:-250px;

left:-200px;

opacity:.35;


}




body::after{


width:500px;

height:500px;

background:#8a2cff;

bottom:-250px;

right:-200px;

opacity:.35;


}






.container{


width:100%;

max-width:460px;

padding:20px;

z-index:2;


}





.card{


padding:45px 35px;


border-radius:40px;


background:

rgba(255,255,255,.08);


border:

1px solid rgba(255,255,255,.15);


backdrop-filter:

blur(35px);


box-shadow:

0 40px 100px rgba(0,0,0,.6);


animation:

enter .8s ease;


}





@keyframes enter{


from{


opacity:0;

transform:

translateY(60px)
scale(.95);


}


to{


opacity:1;

transform:

translateY(0)
scale(1);


}


}






.back{


display:flex;

gap:10px;

align-items:center;


text-decoration:none;

color:white;

opacity:.7;

margin-bottom:30px;


}



.back:hover{

color:#00d9ff;

}






.logo{


text-align:center;

margin-bottom:35px;


}




.logo-icon{


width:100px;

height:100px;


margin:auto;


display:flex;

align-items:center;

justify-content:center;


font-size:45px;


border-radius:35px;


background:

linear-gradient(135deg,#00d9ff,#8a2cff);


box-shadow:

0 25px 60px #00d9ff55;


}





.logo h1{


margin-top:20px;

font-size:40px;

font-weight:900;


}



.logo span{

color:#00d9ff;

}




.logo p{


opacity:.65;

margin-top:8px;


}







h2{


text-align:center;

font-size:30px;

margin-bottom:25px;


}







.input-box{


position:relative;

margin-bottom:20px;


}



.input-box i{


position:absolute;

left:18px;

top:18px;

opacity:.6;


}




input{


width:100%;


padding:

17px 50px;


border-radius:18px;


border:

1px solid rgba(255,255,255,.15);


background:

rgba(255,255,255,.08);


color:white;


outline:none;


font-size:15px;


}



input:focus{


border-color:#00d9ff;


box-shadow:

0 0 25px #00d9ff55;


}








.password-box{


height:6px;


background:

rgba(255,255,255,.15);


border-radius:20px;


overflow:hidden;


margin-top:-10px;


margin-bottom:20px;


}




#strength{


height:100%;


width:0%;


transition:.4s;


background:#ff3333;


}








button{


width:100%;


border:none;


cursor:pointer;


font-size:16px;

font-weight:800;


}




#signupBtn{


padding:17px;


border-radius:18px;


color:white;


background:

linear-gradient(135deg,#00d9ff,#8a2cff);


transition:.3s;


}




#signupBtn:hover{


transform:

translateY(-5px);


box-shadow:

0 20px 50px #00d9ff55;


}







.divider{


display:flex;

align-items:center;

gap:15px;


margin:30px 0;


opacity:.5;


}



.divider::before,
.divider::after{


content:"";

height:1px;

background:white;

flex:1;


}








#googleBtn{


padding:16px;

border-radius:18px;


background:white;


color:#111;


}





#googleBtn i{


color:#4285f4;

margin-right:10px;


}







.bottom{


text-align:center;

margin-top:30px;

opacity:.8;


}



.bottom a{


color:#00d9ff;

font-weight:700;

text-decoration:none;


}







@media(max-width:500px){


.card{

padding:35px 25px;

}


.logo h1{

font-size:32px;

}


}



</style>

</head>



<body>



<div class="container">


<div class="card">



<a href="index.html" class="back">

<i class="fa-solid fa-arrow-left"></i>

Home

</a>






<div class="logo">


<div class="logo-icon">

<i class="fa-solid fa-user-plus"></i>

</div>


<h1>

OMID<span>.</span>

</h1>


<p>

Create your community identity

</p>


</div>








<h2>

Join OMID Community

</h2>








<div class="input-box">


<i class="fa-solid fa-user"></i>


<input

id="username"

placeholder="Your name">


</div>








<div class="input-box">


<i class="fa-solid fa-envelope"></i>


<input

id="email"

type="email"

placeholder="Email address">


</div>








<div class="input-box">


<i class="fa-solid fa-lock"></i>


<input

id="password"

type="password"

placeholder="Create password">


</div>








<div class="password-box">

<div id="strength"></div>

</div>








<button id="signupBtn">


<i class="fa-solid fa-user-plus"></i>

Create Account


</button>








<div class="divider">

OR

</div>








<button id="googleBtn">


<i class="fa-brands fa-google"></i>

Continue with Google


</button>








<div class="bottom">


Already have an account?


<a href="login.html">

Login

</a>


</div>




</div>


</div>








<script type="module" src="auth.js"></script>



<script>


const password =
document.getElementById("password");


const strength =
document.getElementById("strength");



password.addEventListener(
"input",
()=>{


let length =
password.value.length;



if(length < 4){

strength.style.width="25%";

strength.style.background="#ff3333";


}

else if(length < 8){


strength.style.width="60%";

strength.style.background="#ffaa00";


}

else{


strength.style.width="100%";

strength.style.background="#00ff99";


}


});


</script>



</body>

</html>
```
