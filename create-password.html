<!-- create-password.html -->

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Password | OMID Community</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}


body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle,#36206b,#050505 70%);

color:white;

}


.card{

width:430px;

padding:45px;

background:#ffffff10;

border:
1px solid #ffffff20;

backdrop-filter:blur(30px);

border-radius:35px;

text-align:center;

}


.logo{

font-size:30px;
font-weight:800;

}


.logo span{

color:#00d9ff;

}


.lock{

font-size:60px;

margin:30px;

color:#00d9ff;

text-shadow:
0 0 30px #00d9ff;

}


h1{

margin-bottom:15px;

}


p{

opacity:.7;
margin-bottom:30px;

}


.input{

position:relative;

}


.input i{

position:absolute;

left:18px;

top:17px;

opacity:.6;

}


input{

width:100%;

padding:16px 50px;

margin-bottom:18px;

background:#ffffff10;

border:1px solid #ffffff20;

border-radius:18px;

color:white;

outline:none;

}


.strength{

height:6px;

background:#ffffff20;

border-radius:10px;

margin-bottom:20px;

overflow:hidden;

}


#bar{

height:100%;

width:0%;

transition:.3s;

}


button{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:
linear-gradient(90deg,#00d9ff,#8a2cff);

color:white;

font-weight:800;

cursor:pointer;

}


</style>

</head>

<body>

<div class="card">

<div class="logo">

OMID<span>.</span>

</div>

<div class="lock">

<i class="fa-solid fa-shield-halved"></i>

</div>

<h1>
Create Password
</h1>

<p>
Protect your community account
</p>

<div class="input">

<i class="fa-solid fa-lock"></i>

<input 
id="password"
type="password"
placeholder="Create password">

</div>

<div class="strength">

<div id="bar"></div>

</div>

<div class="input">

<i class="fa-solid fa-lock"></i>

<input 
id="confirmPassword"
type="password"
placeholder="Confirm password">

</div>

<button id="continueBtn">

Continue To Community

</button>

</div>

<script>

password.oninput=()=>{

let length=password.value.length;

bar.style.width=
Math.min(length*12.5,100)+"%";

bar.style.background=
length<5?
"red":
length<8?
"orange":
"#00ff99";

};


</script>

</body>

</html>
